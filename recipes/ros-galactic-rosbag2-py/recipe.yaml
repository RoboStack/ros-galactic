package:
  name: ros-galactic-rosbag2-py
  version: 0.9.1
source:
  git_url: https://github.com/ros2-gbp/rosbag2-release.git
  git_rev: release/galactic/rosbag2_py/0.9.1-3
  folder: ros-galactic-rosbag2-py/src/work
  patches:
    - patch/ros-galactic-rosbag2-py.patch

build:
  script:
    sel(win): bld_ament_cmake.bat
    sel(unix): build_ament_cmake.sh
  number: 4
about:
  home: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - "{{ compiler('cxx') }}"
    - "{{ compiler('c') }}"
    - ninja
    - sel(unix): make
    - sel(osx): tapi
    - cmake
    - sel(build_platform != target_platform): python
    - sel(build_platform != target_platform): cross-python_{{ target_platform }}
    - sel(build_platform != target_platform): cython
    - sel(build_platform != target_platform): pybind11
  host:
    - pytest
    - python
    - ros-galactic-ament-cmake-python
    - ros-galactic-ament-cmake-ros
    - ros-galactic-ament-lint-auto
    - ros-galactic-ament-lint-common
    - ros-galactic-pybind11-vendor
    - ros-galactic-python-cmake-module
    - ros-galactic-rcl-interfaces
    - ros-galactic-rclpy
    - ros-galactic-ros-environment
    - ros-galactic-ros-workspace
    - ros-galactic-rosbag2-compression
    - ros-galactic-rosbag2-cpp
    - ros-galactic-rosbag2-storage
    - ros-galactic-rosbag2-storage-default-plugins
    - ros-galactic-rosbag2-transport
    - ros-galactic-rosidl-runtime-py
    - ros-galactic-std-msgs
    - ros2-distro-mutex 0.2 galactic
    - pybind11
  run:
    - python
    - ros-galactic-pybind11-vendor
    - ros-galactic-ros-workspace
    - ros-galactic-rosbag2-compression
    - ros-galactic-rosbag2-cpp
    - ros-galactic-rosbag2-storage
    - ros-galactic-rosbag2-transport
    - ros-galactic-rpyutils
    - ros2-distro-mutex 0.2 galactic
    - sel(osx and x86_64): __osx >={{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
