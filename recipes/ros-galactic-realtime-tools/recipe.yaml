package:
  name: ros-galactic-realtime-tools
  version: 2.2.0
source:
  git_url: https://github.com/ros-gbp/realtime_tools-release.git
  git_rev: release/galactic/realtime_tools/2.2.0-1
  folder: ros-galactic-realtime-tools/src/work

build:
  script:
    sel(win): bld_ament_cmake.bat
    sel(unix): build_ament_cmake.sh
  number: 2
about:
  home: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - "{{ compiler('cxx') }}"
    - "{{ compiler('c') }}"
    - ninja
    - sel(unix): make
    - sel(osx): tapi
    - cmake
    - sel(build_platform != target_platform): python
    - sel(build_platform != target_platform): cross-python_{{ target_platform }}
    - sel(build_platform != target_platform): cython
  host:
    - python
    - ros-galactic-ament-cmake
    - ros-galactic-ament-cmake-gmock
    - ros-galactic-ament-lint-auto
    - ros-galactic-ament-lint-common
    - ros-galactic-rclcpp
    - ros-galactic-rclcpp-action
    - ros-galactic-ros-environment
    - ros-galactic-ros-workspace
    - ros-galactic-test-msgs
    - ros2-distro-mutex 0.2 galactic
  run:
    - python
    - ros-galactic-ament-cmake
    - ros-galactic-rclcpp
    - ros-galactic-rclcpp-action
    - ros-galactic-ros-workspace
    - ros2-distro-mutex 0.2 galactic
    - sel(osx and x86_64): __osx >={{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
